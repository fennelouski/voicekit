# Builds both products and runs the unit test suite.
# App-launch testing (permissions, hotkey, paste) needs a real logged-in
# session and TCC grants — not possible on a CI runner, so it isn't attempted.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - run: swift --version
      - run: swift build
      - run: swift test
